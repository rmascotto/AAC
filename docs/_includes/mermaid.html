<!-- Mermaid.js per il rendering dei diagrammi su GitHub Pages -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
  (function() {
    function initMermaid() {
      if (typeof mermaid === 'undefined') {
        console.error('Mermaid.js not loaded');
        return;
      }

      mermaid.initialize({
        startOnLoad: false,
        theme: 'default',
        securityLevel: 'loose'
      });

      var mermaidBlocks = document.querySelectorAll('pre code.language-mermaid, .language-mermaid pre, pre.language-mermaid');
      
      if (mermaidBlocks.length > 0) {
        mermaidBlocks.forEach(function (block) {
          var div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = block.textContent;

          var pre = block.tagName === 'PRE' ? block : block.closest('pre');
          if (pre) {
            pre.parentNode.replaceChild(div, pre);
          }
        });
        
        mermaid.run();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initMermaid);
    } else {
      initMermaid();
    }
  })();
</script>
